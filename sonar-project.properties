# ==============================================================================
# FinSync — SonarQube Scanner Configuration
#
# These properties tell the scanner:
#   1. Which project to report to (projectKey / organization)
#   2. Where the source code lives (sonar.sources)
#   3. What to ignore (tests, migrations, bytecode, virtual envs)
#   4. Where to find the Python coverage report from pytest
#
# REQUIRED GitLab CI/CD Variables (Settings > CI/CD > Variables):
#   SONAR_TOKEN    — SonarQube authentication token   (masked variable)
#   SONAR_HOST_URL — e.g. https://sonarcloud.io        (masked variable)
# ==============================================================================

# --- Project identity (must match 100% with the SonarQube/SonarCloud UI) ---
sonar.projectKey=giohio_Health-Care-Backend
sonar.organization=giohio
sonar.projectName=Health Care Backend Microservice
sonar.projectVersion=1.0

# --- Source code paths ---
# Production code only; tests are configured separately via sonar.tests below.
sonar.sources=Health Care Backend Microservice
sonar.tests=Health Care Backend Microservice/tests

# --- Exclusions ---
# Skip directories that inflate issue counts without adding real value.
sonar.exclusions=\
  tests/**,\
  **/tests/**,\
  **/migrations/**,\
  **/alembic/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/.venv/**,\
  **/*.pyc,\
  **/htmlcov/**,\
  **/*.pem

sonar.test.inclusions=**/tests/**

# --- Python version ---
sonar.python.version=3.11

# --- Coverage ---
# Path matches what pytest writes via --cov-report=xml in the test stage.
sonar.python.coverage.reportPaths=Health Care Backend Microservice/coverage.xml