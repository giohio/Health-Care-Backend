# SonarQube Scanner Configuration

# Project identity (must match SonarQube/SonarCloud UI)
sonar.projectKey=giohio_Health-Care-Backend
sonar.organization=giohio
sonar.projectName=Health Care Backend Microservice
sonar.projectVersion=1.0

# Explicit source directory inclusions (exclude tests at source level)
sonar.sources=Auth service/Application,Auth service/Domain,Auth service/infrastructure,Auth service/presentation,Appointment Service/Application,Appointment Service/Domain,Appointment Service/infrastructure,Appointment Service/presentation,Doctor Service/Application,Doctor Service/Domain,Doctor Service/infrastructure,Doctor Service/presentation,Patient Service/Application,Patient Service/Domain,Patient Service/infrastructure,Patient Service/presentation,Payment Service/Application,Payment Service/Domain,Payment Service/infrastructure,Payment Service/presentation,Notifiaction Service/Application,Notifiaction Service/Domain,Notifiaction Service/infrastructure,Notifiaction Service/presentation,shared/healthai-common,shared/healthai-db,shared/healthai-cache,shared/healthai-events,shared/healthai-tracing

# Additional exclusions for generated files, configs, and boilerplate
sonar.exclusions=**/__pycache__/**,**/.pyc,**/venv/**,**/.venv/**,**/*.pem,**/htmlcov/**,.github/**,scripts/**,tests/**,**/tests/**,**/test_/**,**/alembic/**,**/migrations/**,**/main.py

# Code duplication exclusions (alembic and outbox patterns have high intentional duplication)
sonar.cpd.exclusions=**/alembic/**,**/infrastructure/publishers/outbox_event_publisher.py,**/infrastructure/database/models.py,**/main.py,**/__pycache__/**

# Python version
sonar.python.version=3.11

# Coverage reports generated in CI (one per service)
sonar.python.coverage.reportPaths=Payment Service/coverage.xml,Notifiaction Service/coverage.xml,Appointment Service/coverage.xml,Auth service/coverage.xml,Doctor Service/coverage.xml,Patient Service/coverage.xml