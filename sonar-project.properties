# SonarQube Scanner Configuration

# Project identity (must match SonarQube/SonarCloud UI)
sonar.projectKey=giohio_Health-Care-Backend
sonar.organization=giohio
sonar.projectName=Health Care Backend Microservice
sonar.projectVersion=1.0

# Sources aligned with full service coverage scope
sonar.sources=Auth service/Application,Auth service/Domain,Auth service/infrastructure,Auth service/presentation,Appointment Service/Application,Appointment Service/Domain,Appointment Service/infrastructure,Appointment Service/presentation,Doctor Service/Application,Doctor Service/Domain,Doctor Service/infrastructure,Doctor Service/presentation,Patient Service/Application,Patient Service/Domain,Patient Service/infrastructure,Patient Service/presentation,Payment Service/Application,Payment Service/Domain,Payment Service/infrastructure,Payment Service/presentation,Notification Service/Application,Notification Service/Domain,Notification Service/infrastructure,Notification Service/presentation,shared

# Strict exclusions to ensure tests are never scanned
sonar.exclusions=**/tests/**,**/test_*.py,**/alembic/**,**/migrations/**,**/env.py,**/__pycache__/**

# Coverage exclusions (files not counted in coverage metrics)
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/alembic/**,**/migrations/**,**/env.py,**/main.py,**/infrastructure/publishers/outbox_event_publisher.py,**/infrastructure/database/models.py

# Duplication check exclusions
sonar.cpd.exclusions=**/tests/**,**/test_*.py,**/alembic/**,**/migrations/**,**/infrastructure/publishers/outbox_event_publisher.py,**/infrastructure/database/models.py,**/env.py

# Python version
sonar.python.version=3.11

# Coverage reports generated in CI (one per service)
# Note: Artifacts are downloaded into coverage-<matrix.component>/coverage.xml
sonar.python.coverage.reportPaths=coverage-Payment Service/coverage.xml,coverage-Notification Service/coverage.xml,coverage-Appointment Service/coverage.xml,coverage-Auth service/coverage.xml,coverage-Doctor Service/coverage.xml,coverage-Patient Service/coverage.xml,coverage-shared/coverage.xml

# Ignore cleartext protocol (S5332) for internal OTEL endpoints
sonar.issue.ignore.multicriteria=r1
sonar.issue.ignore.multicriteria.r1.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.r1.resourceKey=**/*