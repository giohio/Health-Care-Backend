<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthAI | Developer Hub</title>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0f766e;
      --primary-hover: #0b5f59;
      --bg-dark: #0b1220;
      --sidebar-bg: rgba(15, 23, 42, 0.75);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.12);
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: "Outfit", sans-serif;
      overflow: hidden;
    }

    .layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      z-index: 100;
    }

    .logo-area {
      padding: 0 24px 32px 24px;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 24px;
    }

    .logo-area h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0;
      background: linear-gradient(135deg, #2dd4bf 0%, #22c55e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .nav-links {
      flex: 1;
      padding: 0 12px;
    }

    .nav-group-title {
      padding: 12px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-weight: 600;
    }

    .nav-item {
      display: flex;
      align-items: center;
      width: 100%;
      border: none;
      background: none;
      text-align: left;
      font-family: inherit;
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-dim);
      font-size: 0.95rem;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-main);
    }

    .nav-item.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(15, 118, 110, 0.35);
    }

    .nav-item .icon {
      margin-right: 12px;
      font-size: 1.1rem;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(45, 212, 191, 0.1), transparent 40%),
        radial-gradient(circle at bottom left, rgba(34, 197, 94, 0.1), transparent 40%);
    }

    .swagger-ui {
      filter: invert(88%) hue-rotate(180deg) brightness(1.1);
      padding: 24px;
    }

    .swagger-ui .topbar { display: none; }
    .swagger-ui .info { margin: 24px 0; }
    .swagger-ui .info .title { color: #f8fafc !important; }
    .swagger-ui .scheme-container {
      background: transparent !important;
      box-shadow: none !important;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
    }

    .auth-notice {
      margin: 24px;
      padding: 16px;
      background: rgba(15, 118, 110, 0.18);
      border-left: 4px solid var(--primary);
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .auth-notice code {
      font-family: "JetBrains Mono", monospace;
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 6px;
      border-radius: 4px;
      color: #2dd4bf;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <header class="logo-area">
        <h1>HealthAI.hub</h1>
      </header>
      <nav class="nav-links" id="service-list" aria-label="Microservice selection">
        <div class="nav-group-title">Microservices</div>
        <button class="nav-item active" onclick="loadSpec('/auth/openapi.json', this)" aria-pressed="true">
          <span class="icon" aria-hidden="true">🔐</span> Authentication
        </button>
        <button class="nav-item" onclick="loadSpec('/patients/openapi.json', this)" aria-pressed="false">
          <span class="icon" aria-hidden="true">🧑</span> Patient
        </button>
        <button class="nav-item" onclick="loadSpec('/doctors/openapi.json', this)" aria-pressed="false">
          <span class="icon" aria-hidden="true">🩺</span> Doctor
        </button>
        <button class="nav-item" onclick="loadSpec('/appointments/openapi.json', this)" aria-pressed="false">
          <span class="icon" aria-hidden="true">📅</span> Appointment
        </button>
      </nav>

      <footer style="padding: 24px; font-size: 0.8rem; color: var(--text-dim); border-top: 1px solid var(--glass-border);">
        v1.0.0-stable<br>
        HealthAI API Gateway
      </footer>
    </aside>

    <main class="content">
      <section class="auth-notice" aria-labelledby="auth-guide-title">
        <p id="auth-guide-title">Authentication Guide: API calls use <code>HttpOnly</code> cookies. Login first at <b>POST /auth/login</b>.</p>
      </section>
      <div id="swagger-ui" aria-label="API Documentation Viewer"></div>
    </main>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    let currentUI = null;

    function loadSpec(url, element) {
      document.querySelectorAll('.nav-item').forEach((el) => {
        el.classList.remove('active');
        el.setAttribute('aria-pressed', 'false');
      });
      element.classList.add('active');
      element.setAttribute('aria-pressed', 'true');

      currentUI = SwaggerUIBundle({
        url: url,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [SwaggerUIBundle.presets.apis],
        requestInterceptor: (req) => {
          req.credentials = 'include';
          return req;
        }
      });
    }

    window.onload = () => {
      const firstItem = document.querySelector('.nav-item.active');
      if (firstItem) {
        loadSpec('/auth/openapi.json', firstItem);
      }
    };
  </script>
</body>
</html>
