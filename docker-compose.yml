services:
  postgres:
    image: postgres:15-alpine
    container_name: healthcare_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # In a real setup, we'd create multiple DBs in an init script
      # For now, we manually create them or use one DB with schemas
      # Let's assume we use one DB 'healthcare' for all to simplify or use init script
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - healthcare_net

  rabbitmq:
    build:
      context: .
      dockerfile: kong/Dockerfile.rabbitmq
    container_name: healthcare_messaging
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - healthcare_net

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: healthcare_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    networks:
      - healthcare_net

  kong:
    image: kong:3.6-ubuntu
    container_name: healthcare_gateway
    entrypoint: ["/bin/sh", "/scripts/kong-entrypoint.sh"]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong.yml
      - ./scripts/kong-entrypoint.sh:/scripts/kong-entrypoint.sh:ro
      - ./scripts/kong_pubkey.pem:/keys/kong_pubkey.pem:ro
    networks:
      - healthcare_net
    depends_on:
      - auth_service
      - patient_service
      - doctor_service
      - appointment_service
      - payment_service
      - notification_service
      - jaeger

  auth_service:
    build:
      context: .
      dockerfile: ./Auth service/Dockerfile
    container_name: auth_service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/authentication
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      APP_ROOT_PATH: /auth
      OTEL_EXPORTER_OTLP_ENDPOINT: https://jaeger:4318/v1/traces
    networks:
      - healthcare_net
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  patient_service:
    build:
      context: .
      dockerfile: ./Patient Service/Dockerfile
    container_name: patient_service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/patient_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      APP_ROOT_PATH: /patients
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: https://jaeger:4318/v1/traces
    networks:
      - healthcare_net
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  doctor_service:
    build:
      context: .
      dockerfile: ./Doctor Service/Dockerfile
    container_name: doctor_service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/doctor_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      APP_ROOT_PATH: /doctors
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: https://jaeger:4318/v1/traces
    networks:
      - healthcare_net
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  appointment_service:
    build:
      context: .
      dockerfile: ./Appointment Service/Dockerfile
    container_name: appointment_service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/appointment_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      APP_ROOT_PATH: /appointments
      DOCTOR_SERVICE_URL: http://doctor_service:8000
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: https://jaeger:4318/v1/traces
    networks:
      - healthcare_net
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      doctor_service:
        condition: service_started
      redis:
        condition: service_started

  payment_service:
    build:
      context: .
      dockerfile: ./Payment Service/Dockerfile
    container_name: payment_service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/payment_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      APP_ROOT_PATH: /payments
      REDIS_URL: redis://redis:6379/0
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-TV1BKXSO}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-9W8MLHMKMYTSO7DN1JGI1H9XEQOYXPWH}
      VNPAY_URL: https://sandbox.vnpayment.vn/paygate
      OTEL_EXPORTER_OTLP_ENDPOINT: https://jaeger:4318/v1/traces
    networks:
      - healthcare_net
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  notification_service:
    build:
      context: .
      dockerfile: ./Notifiaction Service/Dockerfile
    container_name: notification_service
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/notification_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      APP_ROOT_PATH: /notifications
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      OTEL_EXPORTER_OTLP_ENDPOINT: https://jaeger:4318/v1/traces
    networks:
      - healthcare_net
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: healthcare_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - healthcare_net


  static_docs:
    image: nginx:alpine
    container_name: healthcare_docs_hub
    volumes:
      - ./scripts/docs_hub.html:/usr/share/nginx/html/index.html
    networks:
      - healthcare_net

networks:
  healthcare_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
