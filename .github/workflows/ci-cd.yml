name: Microservices CI/CD

on:
  pull_request:
    branches: [main, develop, feature/**]
  push:
    branches: [main, develop, feature/**]
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: "Run deploy job"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write
  security-events: write

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_CACHE_DIR: .cache/pip

jobs:
  lint_flake8:
    name: Lint - Flake8
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 .

  lint_bandit:
    name: Lint - Bandit SAST
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: |
          bandit -r \
            "Auth service" "Appointment Service" "Doctor Service" \
            "Patient Service" "Notifiaction Service" shared \
            --exclude "**/alembic/**,**/tests/**,**/seed.py" \
            -ll -q

  lint_gitleaks:
    name: Lint - Gitleaks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint_deps:
    name: Lint - Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r "Auth service/requirements.txt" || true
          pip-audit -r "Appointment Service/requirements.txt" || true
          pip-audit -r "Doctor Service/requirements.txt" || true
          pip-audit -r "Patient Service/requirements.txt" || true
          pip-audit -r "Notifiaction Service/requirements.txt" || true

  unit_tests_coverage:
    name: Unit Tests & Coverage (>=85%)
    runs-on: ubuntu-latest
    needs: [lint_flake8, lint_bandit, lint_gitleaks, lint_deps]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -r "Auth service/requirements.txt"
          pip install -r "Appointment Service/requirements.txt"
          pip install -r "Doctor Service/requirements.txt"
          pip install -r "Patient Service/requirements.txt"
          pip install -r "Payment Service/requirements.txt"
          pip install -r "Notifiaction Service/requirements.txt"

      - name: Run unit tests with coverage gate
        env:
          PYTHONPATH: ${{ github.workspace }}/shared/healthai-db:${{ github.workspace }}/shared/healthai-events:${{ github.workspace }}/shared/healthai-cache:${{ github.workspace }}/shared/healthai-common
        run: |
          set -euo pipefail
          services=(
            "Payment Service"
            "Notifiaction Service"
            "Appointment Service"
            "Auth service"
            "Doctor Service"
            "Patient Service"
          )

          for service in "${services[@]}"; do
            echo "\n=== ${service} (coverage >= 85%) ==="
            pushd "${service}" > /dev/null
            pytest tests/unit --cov=Application --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=85 -q
            popd > /dev/null
          done

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            Payment Service/coverage.xml
            Notifiaction Service/coverage.xml
            Appointment Service/coverage.xml
            Auth service/coverage.xml
            Doctor Service/coverage.xml
            Patient Service/coverage.xml

  sonarqube_scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [unit_tests_coverage]
    if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: .

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build_and_push:
    name: Build & Push - ${{ matrix.service.image }}
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [lint_flake8, lint_bandit, lint_gitleaks, lint_deps, unit_tests_coverage]
    strategy:
      fail-fast: false
      matrix:
        service:
          - path: "Auth service"
            image: "auth-service"
          - path: "Appointment Service"
            image: "appointment-service"
          - path: "Doctor Service"
            image: "doctor-service"
          - path: "Patient Service"
            image: "patient-service"
          - path: "Notifiaction Service"
            image: "notification-service"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service.path }}/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image }}:latest

  trivy_scan:
    name: Scan - Trivy (${{ matrix.image }})
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'push'
    needs: [build_and_push]
    strategy:
      fail-fast: false
      matrix:
        image:
          - auth-service
          - appointment-service
          - doctor-service
          - patient-service
          - notification-service
    steps:
      - name: Scan image with Trivy (report)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          format: json
          output: trivy-${{ matrix.image }}.json
          vuln-type: os
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Scan image with Trivy (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}
          format: table
          vuln-type: os
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.json

  deploy:
    name: Deploy (Manual)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [trivy_scan]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_production == 'true'
    environment:
      name: production
    steps:
      - name: Deployment placeholder
        run: echo "Deployment script would run here"

# NOTE:
# - SonarQube job runs only when SONAR_TOKEN and SONAR_HOST_URL are configured.
