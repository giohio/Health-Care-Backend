name: Microservices CI/CD

on:
  pull_request:
    branches: [main, develop, feature/**]
  push:
    branches: [main, develop, feature/**]
  workflow_dispatch:
    inputs:
      deploy_to_production:
        description: "Run deploy job"
        required: false
        default: "false"

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_CACHE_DIR: .cache/pip

jobs:
  lint_flake8:
    name: Lint - Flake8
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 .

  lint_bandit:
    name: Lint - Bandit SAST
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: |
          bandit -r \
            "Auth service" "Appointment Service" "Doctor Service" \
            "Patient Service" "Notifiaction Service" shared \
            --exclude "**/alembic/**,**/tests/**,**/seed.py" \
            -ll -q

  lint_gitleaks:
    name: Lint - Gitleaks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint_deps:
    name: Lint - Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r "Auth service/requirements.txt" || true
          pip-audit -r "Appointment Service/requirements.txt" || true
          pip-audit -r "Doctor Service/requirements.txt" || true
          pip-audit -r "Patient Service/requirements.txt" || true
          pip-audit -r "Notifiaction Service/requirements.txt" || true

  unit_tests_coverage:
    name: Unit Tests & Coverage (>=85%)
    runs-on: ubuntu-latest
    needs: [lint_flake8, lint_bandit, lint_gitleaks, lint_deps]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -r "Auth service/requirements.txt"
          pip install -r "Appointment Service/requirements.txt"
          pip install -r "Doctor Service/requirements.txt"
          pip install -r "Patient Service/requirements.txt"
          pip install -r "Payment Service/requirements.txt"
          pip install -r "Notifiaction Service/requirements.txt"

      - name: Run unit tests with coverage gate
        env:
          PYTHONPATH: ${{ github.workspace }}/shared/healthai-db:${{ github.workspace }}/shared/healthai-events:${{ github.workspace }}/shared/healthai-cache:${{ github.workspace }}/shared/healthai-common
        run: |
          set -euo pipefail
          # Auth service settings require DATABASE_URL at import time.
          export DATABASE_URL="${DATABASE_URL:-postgresql+asyncpg://ci:ci@localhost:5432/healthai_ci}"

          services=(
            "Payment Service"
            "Notifiaction Service"
            "Appointment Service"
            "Auth service"
            "Doctor Service"
            "Patient Service"
          )

          for service in "${services[@]}"; do
            echo "\n=== ${service} (coverage >= 85%) ==="
            pushd "${service}" > /dev/null
            # Isolate import paths per service to avoid cross-service package shadowing.
            unset PYTHONPATH
            cov_targets=(
              --cov=Application
              --cov=Domain
              --cov=infrastructure
              --cov=presentation
            )

            PYTHONPATH="${GITHUB_WORKSPACE}/${service}:${GITHUB_WORKSPACE}/shared/healthai-db:${GITHUB_WORKSPACE}/shared/healthai-events:${GITHUB_WORKSPACE}/shared/healthai-cache:${GITHUB_WORKSPACE}/shared/healthai-common" \
              python -m pytest tests/unit "${cov_targets[@]}" --cov-report=xml:coverage.xml --cov-report=term-missing -q

            # Keep strict quality gate on core business logic while still exporting full coverage for Sonar.
            python -m coverage report --include="Application/*" --fail-under=85
            popd > /dev/null
          done

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            Payment Service/coverage.xml
            Notifiaction Service/coverage.xml
            Appointment Service/coverage.xml
            Auth service/coverage.xml
            Doctor Service/coverage.xml
            Patient Service/coverage.xml

  sonarqube_scan:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    needs: [unit_tests_coverage]
    if: >
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' && github.base_ref == 'main')
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: .

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        with:
          args: >
            -Dproject.settings=sonar-project.properties
            -Dsonar.exclusions=**/tests/**,**/alembic/**,**/migrations/**,**/env.py,**/test_*.py
            -Dsonar.coverage.exclusions=**/tests/**,**/test_*.py,**/alembic/**,**/migrations/**,**/env.py,**/main.py,**/infrastructure/publishers/outbox_event_publisher.py,**/infrastructure/database/models.py
            -Dsonar.cpd.exclusions=**/tests/**,**/test_*.py,**/alembic/**,**/migrations/**,**/env.py,**/infrastructure/publishers/outbox_event_publisher.py,**/infrastructure/database/models.py
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@cb3ed20f9fec62b4c3b8ad9e77656c6adaade913
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

  build_and_push:
    name: Build & Push - ${{ matrix.service.image }}
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [lint_flake8, lint_bandit, lint_gitleaks, lint_deps, unit_tests_coverage]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - path: "Auth service"
            image: "auth-service"
          - path: "Appointment Service"
            image: "appointment-service"
          - path: "Doctor Service"
            image: "doctor-service"
          - path: "Patient Service"
            image: "patient-service"
          - path: "Notifiaction Service"
            image: "notification-service"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (optionally) push image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          file: ./${{ matrix.service.path }}/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service.image }}:latest

  trivy_scan:
    name: Scan - Trivy (${{ matrix.image }})
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'push'
    needs: [build_and_push]
    strategy:
      fail-fast: false
      matrix:
        image:
          - auth-service
          - appointment-service
          - doctor-service
          - patient-service
          - notification-service
    steps:
      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg >/dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan image with Trivy (report)
        run: |
          trivy image \
            --format json \
            --output trivy-${{ matrix.image }}.json \
            --vuln-type os \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

      - name: Scan image with Trivy (fail on HIGH/CRITICAL)
        run: |
          trivy image \
            --format table \
            --vuln-type os \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.json

  deploy:
    name: Deploy (Manual)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [trivy_scan]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_production == 'true'
    environment:
      name: production
    steps:
      - name: Deployment placeholder
        run: echo "Deployment script would run here"

# NOTE:
# - SonarQube job runs only when SONAR_TOKEN and SONAR_HOST_URL are configured.
