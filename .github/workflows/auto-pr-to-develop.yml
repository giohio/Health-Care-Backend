name: Auto PR To Develop

on:
  push:
    branches:
      - feature/**
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  create_or_update_pr:
    name: Create PR -> develop
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - name: Create PR if missing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sourceBranch = context.ref.replace('refs/heads/', '');
            const baseBranch = 'develop';

            if (sourceBranch === baseBranch) {
              core.info('Source branch is develop; skipping.');
              return;
            }

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base: baseBranch,
              head: `${owner}:${sourceBranch}`,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              core.info(`PR already exists: #${existing.data[0].number}`);
              return;
            }

            const title = `Auto PR: ${sourceBranch} -> ${baseBranch}`;
            const body = [
              'This PR was created automatically by CI.',
              '',
              `- Source branch: \`${sourceBranch}\``,
              `- Target branch: \`${baseBranch}\``,
              '',
              'Please review before merging.'
            ].join('\n');

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: sourceBranch,
              base: baseBranch,
              body,
              maintainer_can_modify: true,
            });

            core.info(`Created PR #${created.data.number}`);
